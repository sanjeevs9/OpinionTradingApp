name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        backend: [api-backend, engine, web-socket]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd ${{ matrix.backend }}
          npm install

      - name: Run build command
        run: |
          cd ${{ matrix.backend }}
          npm run build

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ec2-user/OpinionTradingApp
            git pull origin main

            cd engine
            npm install
            npm run build
            cd ..

            cd api-backend
            npm install
            npm run build
            cd ..

            cd web-socket
            npm install
            npm run build
            cd ..

            pm2 restart all
            pm2 save
